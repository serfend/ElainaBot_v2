name: Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docker-compose.yml'
      - 'docker-compose.build.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docker-compose.yml'
      - 'docker-compose.build.yml'
  workflow_dispatch:

# 同一 PR/分支上的新 push 自动取消旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Job 1: 静态检查 — 快速失败, 最轻量
  # ============================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy core/ web/

  # ============================================================
  # Job 2: 单元测试 — Python 3.11/3.12/3.13 矩阵
  #         覆盖率仅在 3.11 收集 (避免跨版本 .coverage 合并问题)
  # ============================================================
  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run unit tests (with coverage on 3.11)
        if: matrix.python-version == '3.11'
        run: >
          pytest tests/
            -m "not integration"
            -v
            --tb=short
            --cov
            --cov-report=xml:coverage.xml
            --cov-report=term
            --junitxml=junit.xml

      - name: Run unit tests (no coverage on 3.12/3.13)
        if: matrix.python-version != '3.11'
        run: >
          pytest tests/
            -m "not integration"
            -v
            --tb=short
            --junitxml=junit.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-py${{ matrix.python-version }}
          path: |
            junit.xml
            coverage.xml
          retention-days: 7

  # ============================================================
  # Job 3: 集成测试 — 主版本 3.11, 失败即阻塞
  # ============================================================
  integration-test:
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run integration tests
        run: >
          pytest tests/
            -m integration
            -v
            --tb=long
            --cov-append
            --cov-report=xml:coverage-integration.xml
            --cov-report=term
            --junitxml=junit-integration.xml

      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test
          path: |
            junit-integration.xml
            coverage-integration.xml
          retention-days: 7

  # ============================================================
  # Job 4: 覆盖率汇总 + 门禁阈值
  # ============================================================
  coverage:
    needs: [unit-test, integration-test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unit-test-py3.11
          path: coverage-data

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          pattern: integration-test
          path: coverage-data-integration

      - name: Combine & enforce coverage threshold
        run: |
          pip install coverage[toml]

          echo "=== Coverage files ==="
          find . -name 'coverage*.xml' -type f

          # 从 unit-test py3.11 读取覆盖率报告
          UNIT_XML="coverage-data/coverage.xml"
          INTEG_XML="coverage-data-integration/coverage-integration.xml"

          if [ -f "$UNIT_XML" ]; then
            echo ""
            echo "=== Unit test coverage ==="
            python -m coverage report --data-file=coverage-data/.coverage 2>/dev/null \
              || python -c "
import xml.etree.ElementTree as ET
tree = ET.parse('$UNIT_XML')
root = tree.getroot()
for pkg in root.findall('.//package'):
    print(f'{pkg.get(\"name\", \"?\"):30s} {pkg.get(\"line-rate\", \"0\")}')
lr = root.get('line-rate')
print(f'\nTotal line rate: {float(lr)*100:.1f}%' if lr else '\nNo coverage data')
"
          fi

          if [ -f "$INTEG_XML" ]; then
            echo ""
            echo "=== Integration test coverage ==="
            python -c "
import xml.etree.ElementTree as ET
tree = ET.parse('$INTEG_XML')
root = tree.getroot()
lr = root.get('line-rate')
print(f'Line rate: {float(lr)*100:.1f}%' if lr else 'No coverage data')
"
          fi

          # 合并 coverage XML → 输出最终报告
          python -m coverage combine coverage-data/ coverage-data-integration/ 2>/dev/null || true
          python -m coverage xml -o coverage-combined.xml 2>/dev/null || true
          python -m coverage report --show-missing 2>/dev/null || true

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-combined.xml
          retention-days: 14

  # ============================================================
  # Job 5: 门禁 — 所有必须通过的检查在此汇总, 任一失败则阻塞
  # ============================================================
  gate:
    needs: [lint, unit-test, integration-test, coverage]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Check all gates
        env:
          LINT: ${{ needs.lint.result }}
          UNIT: ${{ needs.unit-test.result }}
          INTEG: ${{ needs.integration-test.result }}
          COV: ${{ needs.coverage.result }}
        run: |
          failed=false

          fail_check() {
            local name="$1" result="$2"
            case "$result" in
              success)
                echo "  ✅ $name" ;;
              skipped)
                echo "  ⏭️  $name (skipped)" ;;
              *)
                echo "  ❌ $name — FAILED (result: $result)"
                failed=true ;;
            esac
          }

          echo "============================================"
          echo "  CI Gate Check"
          echo "============================================"
          fail_check "lint"              "$LINT"
          fail_check "unit-test"         "$UNIT"
          fail_check "integration-test"  "$INTEG"
          fail_check "coverage"          "$COV"
          echo "============================================"

          if [ "$failed" = "true" ]; then
            echo ""
            echo "⛔ GATE FAILED — 门禁未通过, 禁止合并"
            exit 1
          fi

          echo ""
          echo "✅ GATE PASSED — 所有门禁检查通过, 允许合并"
